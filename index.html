<!DOCTYPE html>
<html>
<head><title>Auth Callback</title></head>
<body>
<script>
  const params   = new URLSearchParams(window.location.search);
  const code     = params.get('code');
  const error    = params.get('error');
  const state    = params.get('state'); // this will be the xApp URL

  if (code && state) {
    // Redirect popup back to xApp with the code
    const returnUrl = state + '&authcode=' + encodeURIComponent(code);
    window.location.href = returnUrl;
  } else {
    document.body.innerHTML = '<p>Error: ' + (error || 'missing parameters') + '</p>';
  }
</script>
<p>Redirecting back to chat...</p>
</body>
</html>
