<!DOCTYPE html>
<html>
<head><title>Auth Callback</title></head>
<body>
<script>
  const params   = new URLSearchParams(window.location.search);
  const code     = params.get('code');
  const error    = params.get('error');
  const state    = params.get('state');

  if (code && state) {
    const stateParams  = new URLSearchParams(decodeURIComponent(state));
    const xAppUrl      = stateParams.get('xappUrl');
    const codeVerifier = stateParams.get('codeVerifier');

    const returnUrl = xAppUrl
      + '&authcode='  + encodeURIComponent(code)
      + '&verifier='  + encodeURIComponent(codeVerifier);

    if (window.opener) {
      // Send back to parent and close popup
      window.opener.location.replace(returnUrl);
      window.close();
    } else {
      // Fallback - redirect this window
      window.location.replace(returnUrl);
    }
  } else {
    document.body.innerHTML = '<p>Error: ' + (error || 'missing parameters') + '</p>';
  }
</script>
<p>Redirecting back to chat...</p>
</body>
</html>
