<!DOCTYPE html>
<html>
<head><title>Auth Callback</title></head>
<body>
<script>
  const params = new URLSearchParams(window.location.search);
  const code   = params.get('code');
  const error  = params.get('error');
  const state  = params.get('state');

  if (code && state) {
    // state is the xApp URL, already decoded
    const xAppUrl    = decodeURIComponent(state);
    const returnUrl  = xAppUrl + '&authcode=' + encodeURIComponent(code);
    window.location.replace(returnUrl);
  } else {
    document.body.innerHTML = '<p>Error: ' + (error || 'missing parameters') + '</p>';
  }
</script>
<p>Redirecting back to chat...</p>
</body>
</html>
